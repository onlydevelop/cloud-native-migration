name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orderdb
          POSTGRES_USER: orderapp
          POSTGRES_PASSWORD: orderapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/orderdb
          DB_USER: orderapp
          DB_PASSWORD: orderapp
        run: ./mvnw test -B

      - name: Build JAR
        run: ./mvnw package -DskipTests -B