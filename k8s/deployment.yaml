apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-monolith
  namespace: order-system
  labels:
    app: order-monolith
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-monolith
  template:
    metadata:
      labels:
        app: order-monolith
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30   # must exceed Step 3's shutdown-timeout (20s)
      containers:
        - name: order-monolith
          image: your-registry/order-monolith:0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-monolith-config
            - secretRef:
                name: order-monolith-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2