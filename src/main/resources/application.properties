spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USER:orderapp}
spring.datasource.password=${DB_PASSWORD:orderapp}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
server.port=${SERVER_PORT:8080}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Don't leak internals - keep health responses minimal for unauthenticated callers
management.endpoint.health.show-details=never

payment.gateway.url=${PAYMENT_GATEWAY_URL:http://localhost:9001/charge}
payment.gateway.timeout-ms=${PAYMENT_GATEWAY_TIMEOUT_MS:2000}

# --- Payment gateway: circuit breaker ---
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.paymentGateway.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentGateway.automatic-transition-from-open-to-half-open-enabled=true

# --- Payment gateway: retry ---
resilience4j.retry.instances.paymentGateway.max-attempts=3
resilience4j.retry.instances.paymentGateway.wait-duration=200ms
resilience4j.retry.instances.paymentGateway.enable-exponential-backoff=true
resilience4j.retry.instances.paymentGateway.exponential-backoff-multiplier=2

# --- Payment gateway: timeout ---
resilience4j.timelimiter.instances.paymentGateway.timeout-duration=2s

# --- Notification: retry only, no circuit breaker (non-critical path) ---
resilience4j.retry.instances.notification.max-attempts=2
resilience4j.retry.instances.notification.wait-duration=500ms

notification.smtp.host=${SMTP_HOST:localhost}
notification.smtp.port=${SMTP_PORT:25}

invoice.storage.path=${INVOICE_STORAGE_PATH:/tmp/invoices}