spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USER:orderapp}
spring.datasource.password=${DB_PASSWORD:orderapp}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
server.port=${SERVER_PORT:8080}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

payment.gateway.url=${PAYMENT_GATEWAY_URL:http://localhost:9001/charge}
payment.gateway.timeout-ms=${PAYMENT_GATEWAY_TIMEOUT_MS:2000}

notification.smtp.host=${SMTP_HOST:localhost}
notification.smtp.port=${SMTP_PORT:25}

invoice.storage.path=${INVOICE_STORAGE_PATH:/tmp/invoices}